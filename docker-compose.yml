services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      API_ORIGIN: http://localhost:3000
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_ACCESS_SECRET: replace-with-a-long-random-string
      JWT_REFRESH_SECRET: replace-with-a-long-random-string
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: 12
      LIPANA_BASE_URL: https://api.lipana.dev/v1
      LIPANA_SECRET_KEY: replace-with-lipana-secret
      LIPANA_WEBHOOK_SECRET: replace-with-webhook-secret
      LIPANA_CALLBACK_URL: http://localhost:4000/api/v1/webhooks/lipana
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
