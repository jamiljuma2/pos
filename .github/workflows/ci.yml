name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pos_saas?schema=public
      - run: npm run build
